---
- name: Install kubectl on bastion
  community.general.snap:
    name: kubectl
    classic: true
    state: present

- name: Install helm on bastion
  community.general.snap:
    name: helm
    classic: true
    state: present

- name: Ensure bastion kube directory exists
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    mode: "0700"

- name: Copy kubeconfig to bastion
  copy:
    src: /tmp/kubeconfig/config
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    mode: "0600"

- name: Add aws-ebs-csi-driver Helm repository
  shell: |
    if ! helm repo list | awk '{print $1}' | grep -qx aws-ebs-csi-driver; then
      helm repo add aws-ebs-csi-driver https://kubernetes-sigs.github.io/aws-ebs-csi-driver
    fi
  args:
    executable: /bin/bash
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
    PATH: /snap/bin:/usr/local/bin:/usr/bin:/bin

- name: Update Helm repositories on bastion
  command: helm repo update
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
    PATH: /snap/bin:/usr/local/bin:/usr/bin:/bin

- name: Install AWS EBS CSI Driver with Helm
  shell: |
    helm upgrade --install aws-ebs-csi-driver \
      --namespace kube-system \
      aws-ebs-csi-driver/aws-ebs-csi-driver
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
    PATH: /snap/bin:/usr/local/bin:/usr/bin:/bin

- name: Copy AWS EBS StorageClass manifest to bastion
  copy:
    src: storageclass.yaml
    dest: /tmp/storageclass.yaml
    owner: ubuntu
    mode: "0644"

- name: Apply AWS EBS StorageClass
  command: kubectl apply -f /tmp/storageclass.yaml
  become_user: ubuntu
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
    PATH: /snap/bin:/usr/local/bin:/usr/bin:/bin

- name: Remove temporary kubeconfig from controller
  file:
    path: /tmp/kubeconfig/config
    state: absent
  delegate_to: localhost
  become: false
  run_once: true
